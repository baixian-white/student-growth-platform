version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sgp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgp_password}
      POSTGRES_DB: ${POSTGRES_DB:-education_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgp_user} -d ${POSTGRES_DB:-education_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./python_backend
    container_name: sgp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sgp_user}:${POSTGRES_PASSWORD:-sgp_password}@db:5432/${POSTGRES_DB:-education_db}
      # Make sure the crawler path works since it's copied into /app
      - PYTHONPATH=/app:/app/crawler
    volumes:
      # Mount crawler directory to ensure crawler imports work if modified
      - ./crawler:/app/crawler

  frontend:
    build:
      context: ./frontend
    container_name: sgp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
