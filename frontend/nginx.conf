server {
    listen 80;
    server_name localhost;

    # Serve the React application
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Required for React Router to handle HTML5 History API
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/ requests to the FastAPI backend container
    location /api/ {
        # Using explicit container name for Podman DNS compatibility
        proxy_pass http://sgp_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings for long-running LLM crawler requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
