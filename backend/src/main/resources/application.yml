spring:
  application:
    name: education-backend

  # ── PostgreSQL 数据库（默认） ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/education_db
    driver-class-name: org.postgresql.Driver
    username: education_user
    password: education_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd

  # ── 定时任务线程池 ────────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 2

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ── 爬虫配置 ────────────────────────────────────────────────────────
crawler:
  # Python 脚本相对于项目根目录的路径
  script-path: crawler/crawl_agent.py
  # DeepSeek API Key（留空则 LLM 增强自动跳过）
  llm-key: ${DEEPSEEK_API_KEY:sk-947ad33399cf46a0a2dc1462899cc9fd}
  # 定时任务 cron：每天凌晨 02:00
  cron: "0 0 2 * * ?"

---
# H2 内存库 profile（仅用于离线开发/测试）：
# 启动命令：--spring.profiles.active=h2
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:education_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    database-platform: org.hibernate.dialect.H2Dialect
